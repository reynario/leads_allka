version: "3.9"

services:
  leads-allka:
    image: ghcr.io/reynario/leads_allka:latest
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      META_ACCESS_TOKEN: "${META_ACCESS_TOKEN}"
      APIFY_TOKEN: "${APIFY_TOKEN}"
      APIFY_INSTAGRAM_ACTOR: "${APIFY_INSTAGRAM_ACTOR:-apify/instagram-profile-scraper}"
      REDRIVE_API_TOKEN: "${REDRIVE_API_TOKEN}"
      REDRIVE_BASE_URL: "${REDRIVE_BASE_URL:-https://api.redrive.com.br}"
      BITRIX_WEBHOOK_URL: "${BITRIX_WEBHOOK_URL}"
      BITRIX_SOURCE_ID: "${BITRIX_SOURCE_ID:-REDRIVE_IA}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      SESSION_SECRET: "${SESSION_SECRET}"
      SESSION_COOKIE_NAME: "${SESSION_COOKIE_NAME:-leads_allka_session}"
      SESSION_MAX_AGE_SECONDS: "${SESSION_MAX_AGE_SECONDS:-28800}"
      BOOTSTRAP_ADMIN_EMAIL: "${BOOTSTRAP_ADMIN_EMAIL}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD}"
      BOOTSTRAP_ADMIN_NAME: "${BOOTSTRAP_ADMIN_NAME:-Admin}"
      SCHEDULER_ENABLED: "${SCHEDULER_ENABLED:-true}"
      PLAYWRIGHT_ENABLED: "${PLAYWRIGHT_ENABLED:-false}"
      GOOGLE_ADS_ENABLED: "${GOOGLE_ADS_ENABLED:-false}"
      DAILY_LEAD_BATCH_SIZE: "${DAILY_LEAD_BATCH_SIZE:-20}"
      DAILY_JOB_HOUR: "${DAILY_JOB_HOUR:-8}"
      DAILY_JOB_MINUTE: "${DAILY_JOB_MINUTE:-0}"
      MAX_RETRY_COUNT: "${MAX_RETRY_COUNT:-3}"
      TZ: "${TZ:-America/Sao_Paulo}"
    networks:
      - RNNet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.leads-allka.rule=Host(`allkaleads.rndigitalmidia.com.br`)"
        - "traefik.http.routers.leads-allka.entrypoints=websecure"
        - "traefik.http.routers.leads-allka.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.leads-allka.loadbalancer.server.port=8000"

networks:
  RNNet:
    external: true
